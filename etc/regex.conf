<regex id="main" maxsize="75000000">
	<!-- match regex must follow: https://docs.oracle.com/javase/8/docs/api/java/util/regex/Pattern.html -->
	<rule id="whitelist" onmatch="accept" force="true">
		<!-- some ppl want all spam -->
		<and>
			<or>
				<match src="rcpt_to">(?i)abuse_adm@|postmaster_adm@</match>
				<match src="header" name="From">(?i)@dfn-cert.de|@opensolaris.org|@sun.com</match>
			</or>
			<!-- find not="true" src="mail_from">@mailfrom.com</find -->
		</and>
	</rule>
	<rule id="MTA idioten" onmatch="reject">
		<msg reply="554" status="5.7.1"
			>Do not trust faked headers and annoy innocent people! Fix your braindamaged MTA!</msg>
		<!--
		<and>
			<find src="rcpt_to">spape</find>
			<or>
				<and id="idiot3">
					<match src="body">Received: from .*mail.relay.de</match>
					<match src="body" not="true">(?i)Message-ID: .*@mail.relay.de</match>
				</and>
				<match id="idiot1" src="header" name="Subject">^Auto:|SPAM|UNSOLICITED BULK EMAIL</match>
			</or>
		</and>
		-->
		<and>
			<find src="header" name="X-RcptTo">followme</find>
			<or>
				<and id="idiot3">
					<match src="body" type="text/rfc822-headers">From: .*followme@mail</match>
					<or>
						<match src="body" type="text/rfc822-headers" not="true"
							>(?i)Message-ID:.*@mail</match>
						<match src="body" type="text/rfc822-headers" not="true"
							>(?i)X-Milter:.*milter4j</match>
					</or>
				</and>
			</or>
		</and>
	</rule>
	<rule id="testus" onmatch="reject">
		<msg reply="554" status="5.7.1">test reject</msg>
		<and>
			<match src="rcpt_to">(?i)testu@</match>
			<find src="body">reject</find>
		</and>
	</rule>
	<rule id="foo" onmatch="reject">
		<msg reply="554" status="5.7.1">foo attachment</msg>
		<or>
			<find src="body" type='application/pdf ; name="AN-*"'></find>
		</or>
	</rule>
	<rule id="russen-kram" onmatch="reject">
		<msg reply="554" status="5.7.1">russian spam not welcome</msg>
		<or>
			<match src="header" name="Subject">=\?koi8-r\?</match>
			<!-- match src="body" type='text/* ; charset="windows-1251"'
    			>\u0427\u04275</match -->
		</or>
	</rule>
	<!-- other shared stuff -->
	<xinclude file="/tmp/regex.common" />
</regex>
<!--
# vim: ts=4 filetype=xml
-->
